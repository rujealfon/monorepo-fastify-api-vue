app = 'monorepo-fastify-api-vue-web'
primary_region = 'sin'

[build]
  dockerfile = 'apps/web/Dockerfile'

[env]
  API_URL = 'http://monorepo-fastify-api-vue-api.internal:8000'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
