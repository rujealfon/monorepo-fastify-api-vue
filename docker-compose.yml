services:
  postgres:
    image: postgres:18-alpine
    container_name: fastify_postgres
    environment:
      POSTGRES_DB: fastify_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres18_data:/var/lib/postgresql
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: fastify_valkey
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: deps
    container_name: fastify_api
    working_dir: /app/apps/api
    restart: unless-stopped
    command: nub watch src/server.ts
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
      TEST_DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_test
      JWT_SECRET: change_this_to_a_random_string_at_least_32_characters
      VALKEY_URL: redis://valkey:6379
      COOKIE_SECRET: ''
      OTEL_ENDPOINT: ''
      LOG_LEVEL: info
      MOBILE_API_KEY: change_this_to_a_random_string_at_least_32_characters
      CORS_ORIGIN: ''
      TRUST_PROXY: ''
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json:ro
      - ./apps/api/eslint.config.js:/app/apps/api/eslint.config.js:ro
      - ./apps/api/vitest.config.ts:/app/apps/api/vitest.config.ts:ro
      - ./packages/eslint-config/create-config.js:/app/packages/eslint-config/create-config.js:ro
      - ./packages/eslint-config/create-config.d.ts:/app/packages/eslint-config/create-config.d.ts:ro
      - ./packages/eslint-config/eslint.config.js:/app/packages/eslint-config/eslint.config.js:ro
      - ./packages/eslint-config/package.json:/app/packages/eslint-config/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro

  # Vue Vite dev server with hot reload — always on in dev
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: fastify_web
    depends_on:
      - api
    environment:
      API_URL: http://api:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts:ro
      - ./apps/api/src/contract:/app/apps/api/src/contract
      - ./apps/api/src/common:/app/apps/api/src/common
      - ./apps/api/src/modules:/app/apps/api/src/modules
      - ./packages/api-client/src:/app/packages/api-client/src

  # Vue nginx production build — opt in with: docker-compose --profile web-prod up -d
  # For same-server: API_URL defaults to http://api:3000 (Docker network)
  # For different-server: set API_URL=https://your-api-domain.com
  web-prod:
    profiles: [web-prod]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: fastify_web_prod
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:3000
    ports:
      - '80:80'

  drizzle-studio:
    build:
      context: .
      target: deps
    container_name: fastify_drizzle_studio
    working_dir: /app/apps/api
    command: ['nubx', 'drizzle-kit', 'studio', '--port', '4983', '--host', '0.0.0.0']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
    ports:
      - '4983:4983'
    volumes:
      - ./apps/api/drizzle.config.ts:/app/apps/api/drizzle.config.ts:ro
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json:ro
      - ./apps/api/src:/app/apps/api/src:ro
      - ./apps/api/migrations:/app/apps/api/migrations
      - ./tsconfig.json:/app/tsconfig.json:ro

  cleanup:
    build:
      context: ./docker/cleanup
    container_name: fastify_cleanup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastify_pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres18_data:
  pgadmin_data:
  valkey_data:
