services:
  postgres:
    image: postgres:18-alpine
    container_name: fastify_postgres
    environment:
      POSTGRES_DB: fastify_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres18_data:/var/lib/postgresql
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: fastify_valkey
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: deps
    container_name: fastify_app
    restart: unless-stopped
    command: nub watch src/server.ts
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
      TEST_DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_test
      JWT_SECRET: change_this_to_a_random_string_at_least_32_characters
      VALKEY_URL: redis://valkey:6379
      COOKIE_SECRET: ''
      OTEL_ENDPOINT: ''
      LOG_LEVEL: info
      MOBILE_API_KEY: change_this_to_a_random_string_at_least_32_characters
      CORS_ORIGIN: ''
      TRUST_PROXY: ''
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./eslint.config.js:/app/eslint.config.js:ro
      - ./vitest.config.ts:/app/vitest.config.ts:ro

  drizzle-studio:
    build:
      context: .
      target: deps
    container_name: fastify_drizzle_studio
    command: ['node_modules/.bin/drizzle-kit', 'studio', '--port', '4983', '--host', '0.0.0.0']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
    ports:
      - '4983:4983'
    volumes:
      - ./drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./src:/app/src:ro
      - ./migrations:/app/migrations

  # prod:
  #   build:
  #     context: .
  #     target: production
  #   container_name: fastify_prod
  #   restart: unless-stopped
  #   command: ['node', 'dist/server.js']
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     valkey:
  #       condition: service_healthy
  #   environment:
  #     HOST: 0.0.0.0
  #     NODE_ENV: production
  #     DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
  #     JWT_SECRET: change_this_to_a_random_string_at_least_32_characters
  #     VALKEY_URL: redis://valkey:6379
  #   ports:
  #     - '8000:8000'

  cleanup:
    build:
      context: ./docker/cleanup
    container_name: fastify_cleanup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastify_pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres18_data:
  pgadmin_data:
  valkey_data:
