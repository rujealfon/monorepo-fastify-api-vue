app = 'monorepo-fastify-api-vue-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'node dist/db/migrate.js'

[env]
  NODE_ENV = 'production'
  HOST = '0.0.0.0'
  LOG_LEVEL = 'info'
  TRUST_PROXY = 'true'
  CORS_ORIGIN = 'https://monorepo-fastify-api-vue-web.fly.dev'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
