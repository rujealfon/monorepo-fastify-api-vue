name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_at_least_32_characters' }}
      MOBILE_API_KEY: ${{ secrets.MOBILE_API_KEY || 'ci_test_mobile_api_key_at_least_32_chars' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install nub
        run: npm install -g @nubjs/nub

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Start databases
        run: docker compose up -d --wait postgres valkey

      - name: Run migrations
        run: |
          for db in fastify_dev fastify_test; do
            for file in apps/api/migrations/*.sql; do
              docker exec -i fastify_postgres psql -v ON_ERROR_STOP=1 -U postgres -d "$db" < "$file"
            done
          done

      - name: Start API container
        run: docker compose up -d --build api

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number || github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
