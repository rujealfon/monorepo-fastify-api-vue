name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_at_least_32_characters' }}
      MOBILE_API_KEY: ${{ secrets.MOBILE_API_KEY || 'ci_test_mobile_api_key_at_least_32_chars' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install nub
        run: npm install -g @nubjs/nub

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Start databases
        run: docker compose up -d --wait postgres valkey

      - name: Run migrations
        run: |
          for db in fastify_dev fastify_test; do
            for file in apps/api/migrations/*.sql; do
              docker exec -i fastify_postgres psql -v ON_ERROR_STOP=1 -U postgres -d "$db" < "$file"
            done
          done

      - name: Start API container
        run: docker compose up -d --build api

      - name: Lint
        run: nub run lint

      - name: Test API
        run: nub run test:unit

      - name: Typecheck shared client
        run: nub run --filter @monorepo-fastify-api-vue/api-client typecheck

      - name: Typecheck web
        run: nub run --filter @monorepo-fastify-api-vue/web typecheck

      - name: Build API
        run: nub run --filter @monorepo-fastify-api-vue/api build

      - name: Build web
        run: nub run --filter @monorepo-fastify-api-vue/web build

      - name: Docker logs
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200 api postgres valkey
